<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Random M4A</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      background: #111;
      color: #eee;
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.5rem;
    }
    button {
      font-size: 1.4rem;
      padding: 1rem 2.5rem;
      background: #444;
      color: white;
      border: 1px solid #777;
      border-radius: 8px;
      cursor: pointer;
    }
    button:hover { background: #555; }
    audio {
      width: 320px;
      max-width: 90vw;
    }
    #status {
      font-size: 1.1rem;
      opacity: 0.8;
      min-height: 1.4em;
    }
  </style>
</head>
<body>

  <button onclick="playRandom()">Random Clip</button>
  <div id="status"></div>
  <audio id="player" controls></audio>

  <script>
    const player = document.getElementById('player');
    const status = document.getElementById('status');

    const files = [
      'clips/New Recording 37.m4a',
      'clips/New Recording 38.m4a',
      'clips/New Recording 39.m4a',
      'clips/New Recording 40.m4a',
      'clips/New Recording 41.m4a',
      'clips/New Recording 42.m4a',
      'clips/New Recording 43.m4a',
      'clips/New Recording 44.m4a',
      'clips/New Recording 45.m4a',
      'clips/New Recording 46.m4a',
      'clips/New Recording 47.m4a',
      'clips/New Recording 48.m4a',
      'clips/New Recording 49.m4a',
      'clips/New Recording 50.m4a',
      'clips/New Recording 51.m4a',
      'clips/New Recording 52.m4a',
      'clips/New Recording 53.m4a',
      'clips/New Recording 54.m4a',
      'clips/New Recording 55.m4a',
      'clips/New Recording 56.m4a',
      'clips/New Recording 57.m4a',
      'clips/New Recording 58.m4a',
      'clips/New Recording 59.m4a',
      'clips/New Recording 60.m4a',
      'clips/New Recording 61.m4a',
      'clips/New Recording 62.m4a',
      'clips/New Recording 63.m4a',
      'clips/New Recording 64.m4a',
      'clips/New Recording 65.m4a',
      'clips/New Recording 66.m4a',
      'clips/New Recording 67.m4a',
      'clips/New Recording 68.m4a',
      'clips/New Recording 69.m4a',
      'clips/New Recording 70.m4a',
      'clips/New Recording 71.m4a',
      'clips/New Recording 72.m4a',
      'clips/New Recording 73.m4a',
      'clips/New Recording 74.m4a',
      'clips/New Recording 75.m4a',
      'clips/New Recording 76.m4a',
      'clips/New Recording 77.m4a',
      'clips/New Recording 78.m4a',
      'clips/New Recording 79.m4a',
      'clips/New Recording 80.m4a',
      'clips/New Recording 81.m4a',
      'clips/New Recording 82.m4a',
      'clips/New Recording 83.m4a',
      'clips/New Recording 84.m4a',
      'clips/New Recording 85.m4a'
    ];

    status.textContent = `${files.length} clips ready`;

    function playRandom() {
      const idx = Math.floor(Math.random() * files.length);
      const file = files[idx];
      const name = file.split('/').pop().replace(/\.m4a$/i, '');
      status.textContent = name;
      player.src = file;
      player.play().catch(() => {
        status.textContent = name + ' (click ▶)';
      });
    }

  </script>

</body>
</html>
